<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Bank</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="position-fixed top-0 end-0 m-3 bg-light p-3 rounded shadow">
        <div class="balance-display">
            <span class="d-none d-lg-inline">ยอดเงินรวม: </span><span id="total-balance" style="font-weight: bold; color: green;">0.00</span> บาท
        </div>
    </div>
    <div class="container mb-2">
        <form class="mt-2 d-flex flex-column align-items-center">
            <div class="row mb-2">
                <label class="form-label text-center" for="transaction-date">วันที่ทำธุรกรรม</label>
                <!-- Add JS Script for fetch current datetime local-->
                <input id="transaction-date-input" class="form-control mx-auto" name="transaction-date" type="datetime-local" value="" style="width: 200px" >
            </div>
            <div class="row mb-2 align-items-center justify-content-center">
                <div class="col-sm-6 col-10 mb-2">
                    <label class="form-label text-center d-block" for="amount">จำนวนเงิน</label>
                    <input id="amount-input" class="form-control w-75 mx-auto text-center" name="amount" type="number" placeholder="20" >
                </div>
                <div class="col-sm-6 col-10 mb-2">
                    <label class="form-label text-center d-block" for="action-type">ประเภทธุรกรรม</label>
                    <select id="action-input" class="form-control w-75 mx-auto text-center" name="action-type" >
                        <option value="deposit">ฝากเงิน</option>
                        <option value="withdraw">ถอนเงิน</option>
                    </select>
                </div>
                <div class="row">
                    <div class="col">
                        <label class="form-label text-center d-block" for="notes">Notes</label>
                        <textarea id="note-input" class="form-control text-center mx-auto" name="notes" rows="3" cols="8"></textarea>
                    </div>
                </div>
            </div>
            <div class="row mb-2">
                <div id="status-alert" class="container justify-content-center align-items-center"></div>
                <div class="d-flex gap-2 justify-content-center mt-2">
                    <button class="btn btn-outline-primary" type="submit">Submit</button>
                    <button class="btn btn-outline-secondary" type="reset" id="clear-btn">Clear</button>
                </div>
            </div>
        </form>
    </div>
    <div class="container">
        <table class="table text-center">
            <thead>
                <tr>
                    <th scope="col">วันที่ทำธุรกรรม</th>
                    <th scope="col">จำนวนเงิน</th>
                    <th scope="col">ประเภทธุรกรรม</th>
                    <th scope="col">หมายเหตุ</th>
                </tr>
            </thead>
            <tbody id="table-body">
            </tbody>
        </table>
    </div>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
