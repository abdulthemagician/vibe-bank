<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Bank</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
    </style>
</head>
<body>
    <div class="container mb-2">
        <form class="mt-2 d-flex flex-column align-items-center">
            <div class="row mb-2">
                <label class="form-label text-center" for="transaction-date">วันที่ทำธุรกรรม</label>
                <!-- Add JS Script for fetch current datetime local-->
                <input id="transaction-date-input" class="form-control mx-auto" name="transaction-date" type="datetime-local" value="" style="width: 200px" required>
            </div>
            <div class="row mb-2 align-items-center justify-content-center">
                <div class="col-sm-6 col-10 mb-2">
                    <label class="form-label text-center d-block" for="amount">จำนวนเงิน</label>
                    <input id="amount-input" class="form-control w-75 mx-auto text-center" name="amount" type="number" placeholder="20" required>
                </div>
                <div class="col-sm-6 col-10 mb-2">
                    <label class="form-label text-center d-block" for="action-type">ประเภทธุรกรรม</label>
                    <select id="action-input" class="form-control w-75 mx-auto text-center" name="action-type" required>
                        <option value="deposit">ฝากเงิน</option>
                        <option value="withdraw">ถอนเงิน</option>
                    </select>
                </div>
                <div class="row">
                    <div class="col">
                        <label class="form-label text-center d-block" for="notes">Notes</label>
                        <textarea id="note-input" class="form-control text-center mx-auto" name="notes" rows="3" cols="8"></textarea>
                    </div>
                </div>
            </div>
            <div id="message" class="d-none container justify-content-center align-items-center mt-3">ABC</div>
            <div class="row mb-2">
                <div class="d-flex gap-2 justify-content-center mt-3">
                    <button class="btn btn-outline-primary" type="button">Submit</button>
                    <button class="btn btn-outline-secondary" type="button" id="clear-btn">Clear</button>
                </div>
            </div>
        </form>
    </div>
    <div class="container">
        <table class="table text-center">
            <thead>
                <tr>
                    <th scope="col">วันที่ทำธุรกรรม</th>
                    <th scope="col">จำนวนเงิน</th>
                    <th scope="col">ประเภทธุรกรรม</th>
                    <th scope="col">หมายเหตุ</th>
                </tr>
            </thead>
            <tbody id="table-body">
            </tbody>
        </table>
    </div>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
