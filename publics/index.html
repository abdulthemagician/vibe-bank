<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Bank</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
    </style>
</head>
<body>
    <div class="container">
        <form class="mt-2 d-flex flex-column align-items-center">
            <div class="row mb-2">
                <label class="form-label text-center" for="transaction-date">วันที่ทำธุรกรรม</label>
                <!-- Add JS Script for fetch current datetime local-->
                <input class="form-control mx-auto" name="transaction-date" type="datetime-local" style="width: 200px">
            </div>
            <div class="row mb-2 align-items-center justify-content-center">
                <div class="col-sm-6 col-10 mb-2">
                    <label class="form-label text-center d-block" for="amount">จำนวนเงิน</label>
                    <input class="form-control w-75 mx-auto text-center" name="amount" type="number" placeholder="20">
                </div>
                <div class="col-sm-6 col-10 mb-2">
                    <label class="form-label text-center d-block" for="action-type">ประเภทธุรกรรม</label>
                    <select class="form-control w-75 mx-auto text-center" name="action-type">
                        <option value="deposit">ฝากเงิน</option>
                        <option value="withdraw">ถอนเงิน</option>
                    </select>
                </div>
                <div class="row">
                    <div class="col">
                        <label class="form-label text-center d-block" for="notes">Notes</label>
                        <textarea class="form-control text-center mx-auto" name="notes" rows="3" cols="8"></textarea>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="d-flex gap-2 justify-content-center mt-3">
                    <button class="btn btn-primary" type="button">Submit</button>
                    <button class="btn btn-outline-secondary" type="button">Clear</button>
                </div>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
